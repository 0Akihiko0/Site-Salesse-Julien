<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    
    <script src="tarteaucitron/tarteaucitron.js"></script>
    <script src="cookies.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="Favicon.png?v=1">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body { 
            background-color: white; 
            color: #0a0a0a; 
            transition: background-color 0.5s ease; 
            font-family: 'Inter', sans-serif; 
        }
        .dark body { background-color: #0a0a0a; color: white; }
        
        .hero-title { font-size: clamp(3rem, 12vw, 10rem); line-height: 0.85; }
        
        /* Formulaire */
        .form-input {
            background: transparent;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dark .form-input { border-bottom: 2px solid rgba(255,255,255,0.1); }
        .form-input:focus { border-bottom-color: #0a0a0a; outline: none; padding-left: 1rem; }
        .dark .form-input:focus { border-bottom-color: white; }

        #submit-btn:disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

        /* POPUP DESIGN RECTANGLE PREMIUM */
        #custom-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0a0a;
            color: white;
            padding: 0;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            z-index: 1000;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            width: 95%;
            max-width: 550px;
            overflow: hidden;
        }

        .popup-content { display: flex; align-items: stretch; min-height: 180px; }

        .popup-image {
            width: 140px;
            background: #141414;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .popup-text-side { flex: 1; padding: 32px; text-align: left; display: flex; flex-direction: column; justify-content: center; }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 999;
        }

        /* ANIMATIONS */
        @keyframes shake {
            0% { transform: translate(-50%, -50%) translateX(0); }
            25% { transform: translate(-50%, -50%) translateX(-8px); }
            50% { transform: translate(-50%, -50%) translateX(8px); }
            75% { transform: translate(-50%, -50%) translateX(-8px); }
            100% { transform: translate(-50%, -50%) translateX(0); }
        }
        .shake-it { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes fadeInScale {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .fade-in-popup { animation: fadeInScale 0.3s ease-out forwards; }

        .turnstile-container { min-height: 100px; width: 100%; margin-top: 2rem; display: flex; align-items: center; justify-content: flex-start; }
    </style>
</head>
<body class="antialiased">

    <script src="navbar.js"></script>
    <script>addNavbar("contact");</script>

    <div id="overlay" onclick="closePopup()"></div>
    <div id="custom-popup">
        <div class="popup-content">
            <div id="popup-img-container" class="popup-image">
                <i id="popup-icon" data-lucide="shield-off" class="w-10 h-10 opacity-20"></i>
            </div>
            <div class="popup-text-side">
                <h2 id="popup-title" class="text-xl font-black uppercase tracking-tighter mb-2">Titre...</h2>
                <p id="popup-message" class="text-zinc-400 text-[11px] leading-relaxed mb-6 uppercase tracking-widest"></p>
                <div>
                    <button id="popup-btn" onclick="closePopup()" class="px-6 py-2 border border-white/20 hover:bg-white hover:text-black transition-all text-[10px] uppercase font-bold tracking-widest">
                        Fermer
                    </button>
                </div>
            </div>
        </div>
    </div>

    <section class="w-full min-h-[50vh] flex items-end px-6 md:px-24 pb-20 pt-20 md:pt-64">
        <div class="z-10 w-full">
            <p class="text-[10px] uppercase tracking-[0.5em] font-bold mb-8 opacity-40 flex items-center gap-4">
                <i data-lucide="send" class="w-4 h-4"></i> Une question ?
            </p>
            <h1 class="hero-title font-black uppercase tracking-tighter">
                Me<br>Contacter<span class="text-zinc-300 dark:text-zinc-700">.</span>
            </h1>
        </div>
    </section>

    <section class="py-20 border-t border-zinc-100 dark:border-zinc-900 px-6 md:px-24">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-16">
            
            <div class="md:col-span-5">
                <p class="text-lg opacity-70 italic leading-relaxed border-l-2 border-zinc-900 dark:border-white pl-6">
                    Qu'il s'agisse d'une recommandation ou d'une simple question, n'hésitez pas !
                </p>
                <div class="mt-12">
                    <div class="flex items-center gap-4 opacity-40">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                        <span class="text-sm font-mono tracking-widest">julien.salesse24@gmail.com</span>
                    </div>
                </div>
            </div>

            <div class="md:col-span-7">
                <form id="contact-form" class="space-y-12">
                    <input type="hidden" name="title" value="Contact Portfolio">
                    
                    <div class="group">
                        <label class="text-[10px] uppercase tracking-widest font-bold opacity-30">Nom complet</label>
                        <input type="text" name="name" required placeholder="John Doe" 
                               class="form-input w-full py-4 text-2xl md:text-3xl font-medium">
                    </div>

                    <div class="group">
                        <label class="text-[10px] uppercase tracking-widest font-bold opacity-30">Adresse Email</label>
                        <input type="email" name="email" required placeholder="john@doe.com" 
                               class="form-input w-full py-4 text-2xl md:text-3xl font-medium">
                    </div>

                    <div class="group">
                        <label class="text-[10px] uppercase tracking-widest font-bold opacity-30">Message</label>
                        <textarea name="message" required rows="4" placeholder="Bonjour..." 
                                  class="form-input w-full py-4 text-2xl md:text-3xl font-medium"></textarea>
                    </div>

                    <div id="turnstile-container" class="turnstile-container">
                        <div class="cf-turnstile" 
                             data-sitekey="0x4AAAAAACZULG1-lPsQtROa" 
                             data-callback="enableButton"></div>
                    </div>

                    <button type="submit" id="submit-btn" disabled class="group flex items-center gap-6 mt-12 transition-all">
                        <span id="btn-text" class="text-4xl md:text-6xl font-black uppercase tracking-tighter">Envoyer</span>
                        <div class="w-12 h-12 md:w-16 md:h-16 rounded-full border border-zinc-900 dark:border-white flex items-center justify-center group-hover:bg-zinc-900 dark:group-hover:bg-white group-hover:text-white dark:group-hover:text-black transition-all">
                            <i data-lucide="arrow-right" class="w-6 h-6"></i>
                        </div>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <script src="footer.js"></script>
    <script>if(typeof addFooter === 'function') addFooter();</script>

    <script>
        // Gestion Unifiée de la Pop-up
        function showPopup(type, title, message) {
            const popup = document.getElementById('custom-popup');
            const overlay = document.getElementById('overlay');
            const icon = document.getElementById('popup-icon');
            
            document.getElementById('popup-title').innerText = title;
            document.getElementById('popup-message').innerText = message;
            
            // Configuration selon le type (Succès ou Erreur)
            if(type === 'success') {
                icon.setAttribute('data-lucide', 'check-circle');
                icon.className = "w-10 h-10 opacity-40 text-white";
                popup.style.borderColor = "rgba(255,255,255,0.1)";
                popup.classList.add('fade-in-popup');
            } else {
                icon.setAttribute('data-lucide', 'shield-off');
                icon.className = "w-10 h-10 opacity-20 text-zinc-500";
                popup.style.borderColor = "rgba(255,255,255,0.1)";
                popup.classList.add('shake-it');
            }
            
            popup.style.display = 'block';
            overlay.style.display = 'block';
            
            if (window.lucide) lucide.createIcons();
            
            // Nettoyage des classes d'animation pour la prochaine fois
            setTimeout(() => {
                popup.classList.remove('shake-it');
                popup.classList.remove('fade-in-popup');
            }, 600);
        }

        function closePopup() {
            document.getElementById('custom-popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function enableButton() {
            document.getElementById('submit-btn').disabled = false;
        }

        document.getElementById('contact-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            const btnText = document.getElementById('btn-text');
            const btn = document.getElementById('submit-btn');
            const formData = new FormData(this);
            
            btnText.innerText = "VÉRIFICATION...";
            btn.disabled = true;

            try {
                const workerUrl = "https://formulaire-contact.julien-salesse24.workers.dev";
                const response = await fetch(workerUrl, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    btnText.innerText = "ENVOYÉ !";
                    // AFFICHAGE POP-UP SUCCÈS
                    showPopup('success', 'C\'est tout bon !', 'Votre message a bien été envoyé.');
                    this.reset();
                    // On laisse la pop-up visible 3 secondes avant de recharger
                    setTimeout(() => location.reload(), 3500);
                } else {
                    throw new Error(result.error || "Échec de l'envoi");
                }
            } catch (error) {
                btnText.innerText = "ERREUR";
                btn.disabled = false;
                
                let customMsg = "Une erreur est survenue lors de l'envoi.";
                if(error.message.includes("Turnstile")) {
                    customMsg = "Sécurité : Veuillez valider le test anti-robot avant l'envoi.";
                }
                
                // AFFICHAGE POP-UP ERREUR
                showPopup('error', 'Une erreur technique...', customMsg);
            }
        });

        window.addEventListener('load', () => { if (window.lucide) lucide.createIcons(); });
    </script>
    <script src="loader.js"></script>
</body>
</html>
